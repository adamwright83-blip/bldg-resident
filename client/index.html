<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f4ecdf" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>BLDG.chat</title>
    <!-- First-paint insurance: the screen must NEVER hit unstyled white — not
         at boot, not between bundle loads. Branded warm cream paints before
         any stylesheet or JS arrives. -->
    <style>
      html, body, #root { background: #f4ecdf; margin: 0; }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <!-- Demo shim: no-op unless URL has ?demo=1. Lets HELD run without backend. -->
    <script src="/held-demo-shim.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
